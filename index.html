<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語学習</title>
<style>
body { font-family: sans-serif; text-align: center; padding: 20px; }
#word { font-size: 32px; margin: 40px 0; }
button { font-size: 18px; margin: 10px; padding: 10px 20px; }
.hidden { display: none; }
</style>
</head>
<body>

<h1>英単語学習</h1>

<input type="file" id="fileInput" accept=".csv"><br><br>

<div id="main" class="hidden">
  <div id="word"></div>
  <div id="meaning" class="hidden"></div>

  <button onclick="showMeaning()">答えを見る</button>

  <div id="buttons" class="hidden">
    <button onclick="answer('◎')">◎</button>
    <button onclick="answer('△')">△</button>
    <button onclick="answer('×')">×</button>
  </div>

  <br>
  <button onclick="showAnalysis()">分析</button>
  <button onclick="toggleReview()">復習モード切替</button>
</div>

<div id="analysis" class="hidden"></div>

<script>
let words = [];
let current;
let startTime;
let reviewMode = false;

// ===== CSV読み込み =====
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    parseCSV(event.target.result);
  };
  reader.readAsText(file);
});

function parseCSV(text) {
  const lines = text.trim().split("\n");

  // ヘッダー確認
  const header = lines[0].split(",");
  if (header.length < 4) {
    alert("CSV形式が不正です");
    return;
  }

  words = [];

  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(",");
    if (parts.length < 4) continue;

    const [word, meaning, pos, tag] = parts;
    words.push({ word, meaning, pos, tag });
  }

  if (words.length === 0) {
    alert("有効なデータがありません");
    return;
  }

  document.getElementById("main").classList.remove("hidden");
  nextWord();
}

// ===== 出題 =====
function nextWord() {
  let pool = words;

  if (reviewMode) {
    const data = getData();
    pool = words.filter(w => {
      const records = data.filter(d => d.word === w.word);
      return records.some(r => r.eval !== '◎');
    });
    if (pool.length === 0) pool = words;
  }

  current = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById("word").innerText = current.word;
  document.getElementById("meaning").classList.add("hidden");
  document.getElementById("buttons").classList.add("hidden");
  startTime = Date.now();
}

// ===== 表示 =====
function showMeaning() {
  document.getElementById("meaning").innerText = current.meaning;
  document.getElementById("meaning").classList.remove("hidden");
  document.getElementById("buttons").classList.remove("hidden");
}

// ===== 記録 =====
function answer(evalResult) {
  const time = (Date.now() - startTime) / 1000;

  const record = {
    word: current.word,
    eval: evalResult,
    time: time,
    pos: current.pos,
    tag: current.tag
  };

  const data = getData();
  data.push(record);
  localStorage.setItem("records", JSON.stringify(data));

  nextWord();
}

function getData() {
  return JSON.parse(localStorage.getItem("records") || "[]");
}

// ===== 分析 =====
function showAnalysis() {
  const data = getData();
  let html = "<h2>分析</h2>";

  function calc(groupKey) {
    const groups = {};
    data.forEach(d => {
      if (!groups[d[groupKey]]) groups[d[groupKey]] = [];
      groups[d[groupKey]].push(d);
    });

    for (let key in groups) {
      const arr = groups[key];
      let score = arr.reduce((sum, d) => {
        if (d.eval === '◎') return sum + 1;
        if (d.eval === '△') return sum + 0.5;
        return sum;
      }, 0);
      let rate = (score / arr.length * 100).toFixed(1);
      html += `${key}: ${rate}%<br>`;
    }
  }

  html += "<h3>タグ別</h3>";
  calc("tag");

  html += "<h3>品詞別</h3>";
  calc("pos");

  const wordStats = {};
  data.forEach(d => {
    if (!wordStats[d.word]) wordStats[d.word] = { score: 0, count: 0, time: 0 };
    if (d.eval === '◎') wordStats[d.word].score += 1;
    if (d.eval === '△') wordStats[d.word].score += 0.5;
    wordStats[d.word].count += 1;
    wordStats[d.word].time += d.time;
  });

  const ranking = Object.entries(wordStats).map(([word, v]) => ({
    word,
    avgScore: v.score / v.count,
    avgTime: v.time / v.count
  })).sort((a, b) => a.avgScore - b.avgScore || b.avgTime - a.avgTime).slice(0, 10);

  html += "<h3>苦手単語</h3>";
  ranking.forEach(r => {
    html += `${r.word} (score:${r.avgScore.toFixed(2)}, time:${r.avgTime.toFixed(1)}s)<br>`;
  });

  document.getElementById("analysis").innerHTML = html;
  document.getElementById("analysis").classList.remove("hidden");
}

// ===== 復習モード =====
function toggleReview() {
  reviewMode = !reviewMode;
  alert("復習モード: " + (reviewMode ? "ON" : "OFF"));
  nextWord();
}
</script>

</body>
</html>
